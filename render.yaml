services:
  - type: web
    name: fairlens-backend
    runtime: python
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt && python data/generate_biased_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false
